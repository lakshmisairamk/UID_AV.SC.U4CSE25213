<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Page</title>
    <style>
        /* Setup the layout */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Arial', sans-serif;
        }

        /* Container to stack heading and ball */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 300px; /* Gives the ball room to move */
            justify-content: space-between;
        }

        h1 {
            color: #ecf0f1;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* The Ball */
        .ball {
            width: 60px;
            height: 60px;
            background-color: #e74c3c;
            border-radius: 50%;
            /* Animation: name | duration | timing | iteration | direction */
            animation: bounce 0.6s ease-in infinite alternate;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3);
        }

        /* The Bouncing Logic */
        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-150px);
            }
        }
    </style>
</head>
<body>

    <div class="stage">
        <h1>Bouncing Ball</h1>
        <div class="ball"></div>
    </div>

</body>
</html>
