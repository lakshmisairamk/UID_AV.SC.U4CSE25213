<!DOCTYPE html>
<html>
<head>
<title style="font-family: 'Times New Roman', Times, serif;">Music Legends Cards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    background-image: url('https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=1800&q=80&fit=crop');
      background-size: cover;
}

h1{
    font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.4rem);
      color: #f5efe4;
      letter-spacing: 0.04em;
      line-height: 1.1;
}
header { text-align: center;font-size: 20px; }
    .label {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(210,175,120,0.85);
      margin-bottom: 16px;
    }

.card-container{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    background:#111;
    width:300px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
    transition:0.4s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 30px rgba(0,255,255,0.8);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.card-content h2{
    margin:10px 0;
}

button{
    background:#00ffff;
    border:none;
    padding:10px 20px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#ff00ff;
    color:white;
}

@media(max-width:768px){
    .card-container{
        flex-direction:column;
        align-items:center;
    }
}
</style>
</head>

<body>

<header>
    <span class="label">Indian Cinema Music</span>
    <h1>The Maestros</h1>
    <div class="rule"></div>
  </header>

<div class="card-container">

   
    <div class="card">
        <img src="https://media.assettype.com/freepressjournal/2023-09/711b82a5-1eba-44be-b931-64dd30ecbb3a/20230202045L.jpg">
        <div class="card-content">
            <h2>A. R. Rahman</h2>
            <p>Oscar-winning music composer known as the Mozart of Madras.</p>
            <button>View More</button>
        </div>
    </div>

    
    <div class="card">
        <img src="https://media.cinemaexpress.com/cinemaexpress%2F2026-03-03%2F1pqfz22b%2FAnirudh-1.jpg">
        <div class="card-content">
            <h2>Anirudh Ravichander</h2>
            <p>Young sensational composer known for energetic and trendy music.</p>
            <button>View More</button>
        </div>
    </div>

   
    <div class="card">
        <img src="https://cdn.gulte.com/wp-content/uploads/2022/10/Thaman-RC15.jpg">
        <div class="card-content">
            <h2>S. Thaman</h2>
            <p>Popular South Indian music director known for mass beats.</p>
            <button>View More</button>
        </div>
    </div>

</div>

</body>
</html>
